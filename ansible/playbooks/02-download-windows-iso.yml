---
# Download Windows ISO to ~/iso on RHEL host
#
# Provide URL via -e windows_iso_url="https://..."
# Or place ISO manually in ~/iso/
#
# Usage:
#   ansible-playbook -i inventory/hosts.yml playbooks/02-download-windows-iso.yml \
#     -e "windows_iso_url=https://example.com/Win11_23H2.iso"
#   ansible-playbook -i inventory/hosts.yml playbooks/02-download-windows-iso.yml \
#     -e "windows_iso_url=..." -e "windows_iso_filename=Win11.iso"

- name: "Download Windows ISO to vmadmin iso directory"
  hosts: rhel_vm_hosts
  become: true
  become_user: "{{ vm_admin_user | default('vmadmin') }}"
  gather_facts: true
  vars:
    windows_iso_url: "{{ windows_iso_url | default('') }}"
    windows_iso_filename: "{{ windows_iso_filename | default('Win11_23H2_English_x64.iso') }}"
    iso_dest: "/home/{{ vm_admin_user | default('vmadmin') }}/iso/{{ windows_iso_filename }}"
  tasks:
    - name: "Ensure iso directory exists"
      ansible.builtin.file:
        path: "/home/{{ vm_admin_user | default('vmadmin') }}/iso"
        state: directory
        owner: "{{ vm_admin_user | default('vmadmin') }}"
        group: "{{ vm_admin_user | default('vmadmin') }}"
        mode: "0755"

    - name: "Download Windows ISO from URL"
      ansible.builtin.get_url:
        url: "{{ windows_iso_url }}"
        dest: "{{ iso_dest }}"
        mode: "0644"
        timeout: 1800
      when: windows_iso_url | length > 0

    - name: "Skip download when no ISO URL provided"
      ansible.builtin.debug:
        msg: |
          No windows_iso_url provided. Place ISO manually in {{ iso_dest }}
          Or run with: -e "windows_iso_url=https://example.com/Win11.iso"
      when: windows_iso_url | length == 0

    - name: "Report ISO path"
      ansible.builtin.debug:
        msg: "ISO saved to {{ iso_dest }}"
      when: windows_iso_url | length > 0
