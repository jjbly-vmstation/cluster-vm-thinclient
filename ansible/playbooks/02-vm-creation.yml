- name: Build and Sync Windows 11 Golden Image
  hosts: wsdc-homelab
  gather_facts: true
  vars:
    # --- CONNECTION (NATIVE OPENSSH) ---
    ansible_connection: ssh
    ansible_shell_type: powershell
    ansible_user: 'VMSTATION\ansible_svc'
    ansible_ssh_common_args: '-o ProxyCommand=none'
    
    # --- PATHS (R430 LOCAL & NFS) ---
    packer_dir: "C:\\vmstation-org\\cluster-vm-thinclient\\packer"
    local_output: "F:\\Hyper-V\\Templates\\win11-template"
    nfs_output: "Z:\\iso\\win11e"
    local_vhdx: "F:\\Hyper-V\\Templates\\win11-template\\win11-template\\Virtual Hard Disks\\win11-template.vhdx"
    vars_files:
    # Use absolute paths so it doesn't matter where you run the playbook from
    - /opt/vmstation-org/cluster-vm-thinclient/ansible/group_vars/all.yml

  tasks:
    - name: 1. Verify Authentication
      ansible.windows.win_whoami:
      register: whoami_results

    - name: 2.1 Ensure Windows Packer directory exists
      ansible.windows.win_file:
        path: "{{ packer_dir }}"
        state: directory

    - name: 2.2 Template and Push Autounattend
      ansible.windows.win_template:
        src: /opt/vmstation-org/cluster-vm-thinclient/packer/autounattend.xml.j2
        dest: "{{ packer_dir }}\\autounattend.xml"

    - name: 2.3 Copy remaining Packer HCL files
      ansible.windows.win_copy:
        src: /opt/vmstation-org/cluster-vm-thinclient/packer/win11.pkr.hcl
        dest: "{{ packer_dir }}\\win11.pkr.hcl"

    - name: 3. Execute Packer Build
      ansible.windows.win_shell: |
        C:\Packer\packer.exe init win11.pkr.hcl
        C:\Packer\packer.exe build -force -var "vm_password={{ vm_password }}" win11.pkr.hcl
      args:
        chdir: "{{ packer_dir }}"

    - name: 4. Ensure NFS destination exists (Z drive)
      ansible.windows.win_file:
        path: "{{ nfs_output }}"
        state: directory

    - name: 5. Copy VHDX to NFS for Terraform
      ansible.windows.win_copy:
        src: "{{ local_vhdx }}"
        dest: "{{ nfs_output }}\\win11-base.vhdx"
        remote_src: yes

    - name: 6. Cleanup local build artifacts
      ansible.windows.win_file:
        path: "{{ local_output }}"
        state: absent
      when: packer_result.rc == 0