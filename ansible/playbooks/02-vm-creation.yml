---
- name: Phase 1 - Build Golden Image (Packer)
  hosts: homelab
  become: true
  vars_files:
    - "/opt/vmstation-org/cluster-setup/ansible/inventory/group_vars/compute_nodes.yml"
  vars:
    project_root: "/home/vmadmin/vmstation-org/cluster-vm-thinclient"
    packer_dir: "{{ project_root }}/packer"
    template_path: "/home/vmadmin/vmware/win11-template/win11-template.vmx"

  tasks:
    - name: Install Packer
      shell: |
        dnf config-manager --add-repo https://rpm.releases.hashicorp.com/RHEL/hashicorp.repo
        dnf install -y packer
      args:
        creates: /usr/bin/packer

    - name: Create project structure
      file:
        path: "{{ packer_dir }}"
        state: directory
        owner: vmadmin
        group: vmadmin

    - name: Generate Secure autounattend.xml from Template
      template:
        src: "../../packer/autounattend.xml.j2"
        dest: "{{ packer_dir }}/autounattend.xml"
        owner: vmadmin
        group: vmadmin
        mode: '0600'

    - name: Sync Packer build files
      ansible.posix.synchronize:
        src: "../../packer/"
        dest: "{{ packer_dir }}/"
        recursive: yes
        rsync_opts: ["--exclude=autounattend.xml"]

    - name: Run Packer Build
      shell: |
        packer init .
        packer build -force win11.pkr.hcl
      args:
        chdir: "{{ packer_dir }}"
      become_user: vmadmin
      when: not (template_path | exists) # Custom check or use stat task

    - name: Cleanup Secrets
      file:
        path: "{{ packer_dir }}/autounattend.xml"
        state: absent