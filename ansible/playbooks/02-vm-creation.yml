---
- name: End-to-End Windows 11 Automation (Packer + Terraform)
  hosts: homelab
  become: true
  vars_files:
    - "/opt/vmstation-org/cluster-setup/ansible/inventory/group_vars/compute_nodes.yml"
  vars:
    project_root: "/home/vmadmin/vmstation-org/cluster-vm-thinclient"
    packer_dir: "{{ project_root }}/packer"
    terraform_dir: "{{ project_root }}/terraform"
    template_path: "/home/vmadmin/vmware/win11-template/win11-template.vmx"

  tasks:
    # --- PHASE 1: SYSTEM SETUP ---
    - name: Add HashiCorp Repo
      shell: dnf config-manager --add-repo https://rpm.releases.hashicorp.com/RHEL/hashicorp.repo
      args:
        creates: /etc/yum.repos.d/hashicorp.repo

    - name: Install Packer and Terraform
      dnf:
        name: 
          - packer
          - terraform
        state: present

    - name: Create project structure
      file:
        path: "{{ item }}"
        state: directory
        owner: vmadmin
        group: vmadmin
        mode: '0755'
      loop: ["{{ packer_dir }}", "{{ terraform_dir }}"]

    # --- PHASE 2: CONFIG & SECRETS ---
    - name: Sync codebase (Excluding sensitive XML)
      ansible.posix.synchronize:
        src: "../../"
        dest: "{{ project_root }}/"
        recursive: yes
        delete: yes
        rsync_opts: ["--exclude=packer/autounattend.xml"]

    - name: Generate Secure autounattend.xml from Template
      template:
        src: "../../packer/autounattend.xml.j2"
        dest: "{{ packer_dir }}/autounattend.xml"
        owner: vmadmin
        group: vmadmin
        mode: '0600'

    # --- PHASE 3: THE BUILD ---
    - name: Check for existing Golden Image
      stat:
        path: "{{ template_path }}"
      register: template_file

    - name: Initialize and Build Packer Template
      shell: |
        packer init .
        packer build -force win11.pkr.hcl
      args:
        chdir: "{{ packer_dir }}"
      become_user: vmadmin
      when: not template_file.stat.exists

    # --- PHASE 4: THE DEPLOY ---
    - name: Deploy VM via Terraform Clone
      shell: |
        terraform init -upgrade
        terraform apply -auto-approve -var="sourceid={{ template_path }}"
      args:
        chdir: "{{ terraform_dir }}"
      become_user: vmadmin

    - name: Cleanup Secrets
      file:
        path: "{{ packer_dir }}/autounattend.xml"
        state: absent