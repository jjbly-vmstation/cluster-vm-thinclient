---
- name: Phase 2 - Production Deployment
  hosts: homelab
  become: true
  vars_files:
    - "/opt/vmstation-org/cluster-setup/ansible/inventory/group_vars/compute_nodes.yml"
  vars:
    project_root: "/home/vmadmin/vmstation-org/cluster-vm-thinclient"
    terraform_dir: "{{ project_root }}/terraform"
    
    # Template Paths
    template_nfs_dir: "/mnt/media/iso/win11e"
    template_local_dir: "/mnt/storage/vmware/win11-template"
    template_local_vmx: "{{ template_local_dir }}/win11-template.vmx"
    
    # Production Paths
    vm_dest_dir: "/mnt/storage/vmware/win11-production"
    vm_dest_vmx: "{{ vm_dest_dir }}/win11-production.vmx"

  tasks:
    - name: Install Terraform and dependencies
      dnf:
        name: 
          - dnf-plugins-core
          - terraform
        state: present

    - name: Sync Terraform codebase
      ansible.posix.synchronize:
        src: "../../terraform/"
        dest: "{{ terraform_dir }}/"
        recursive: yes
        delete: yes

    - name: Fix directory ownership
      file:
        path: "{{ project_root }}"
        owner: vmadmin
        group: vmadmin
        recurse: yes

    - name: Ensure deployment directory exists
      file:
        path: "{{ vm_dest_dir }}"
        state: directory
        owner: vmadmin
        group: vmadmin

    - name: Ensure local writable template directory exists
      file:
        path: "{{ template_local_dir }}"
        state: directory
        owner: vmadmin
        group: vmadmin

    - name: Stage Packer template from read-only NFS to local storage
      ansible.posix.synchronize:
        src: "{{ template_nfs_dir }}/"
        dest: "{{ template_local_dir }}/"
      delegate_to: "{{ inventory_hostname }}"

    - name: Ensure vmadmin owns the copied template files
      file:
        path: "{{ template_local_dir }}"
        owner: vmadmin
        group: vmadmin
        recurse: yes

    - name: Force VMware to register template (Power Cycle)
      shell: |
        /usr/bin/vmrun -T ws start "{{ template_local_vmx }}" nogui
        /usr/bin/vmrun -T ws stop "{{ template_local_vmx }}" hard
      become_user: vmadmin
      ignore_errors: true
    - name: Restart vmrest API to refresh inventory cache
      shell: |
        pkill -9 vmrest || true
        nohup vmrest > /dev/null 2>&1 &
      become_user: vmadmin

    - name: Wait for API to come online
      wait_for:
        port: 8697
        delay: 2

    - name: Query VMware REST API for VM Inventory
      uri:
        url: "http://127.0.0.1:8697/api/vms"
        method: GET
        url_username: vmadmin
        url_password: "{{ vmws_pass }}"
        force_basic_auth: yes
        return_content: yes
      register: api_response

    - name: Extract Template VM ID dynamically
      set_fact:
        template_vm_id: "{{ item.id }}"
      loop: "{{ api_response.json }}"
      when: "'win11-template.vmx' in item.path"

    - name: Terraform Apply
      shell: |
        terraform init
        terraform apply -auto-approve \
          -var="vmws_pass={{ vmws_pass }}" \
          -var="sourceid={{ template_vm_id }}"
      args:
        chdir: "{{ terraform_dir }}"
      become_user: vmadmin

    - name: Configure 100% Uptime Service (Systemd)
      copy:
        dest: /etc/systemd/system/win11-production.service
        content: |
          [Unit]
          Description=Windows 11 Production VM
          After=network.target vmware.service
          Requires=vmware.service

          [Service]
          Type=forking
          ExecStart=/usr/bin/vmrun -T ws start "{{ vm_dest_vmx }}" nogui
          ExecStop=/usr/bin/vmrun -T ws stop "{{ vm_dest_vmx }}" soft
          Restart=always
          RestartSec=30
          User=vmadmin

          [Install]
          WantedBy=multi-user.target

    - name: Enable and Start VM
      systemd:
        name: win11-production
        enabled: true
        state: started
        daemon_reload: true

    - name: Setup Automated Nightly Backups
      cron:
        name: "Nightly Win11 Backup"
        minute: "0"
        hour: "2"
        job: "/usr/bin/vmrun -T ws snapshot {{ vm_dest_vmx }} Backup-$(date +\\%Y-\\%m-\\%d) && cp -r {{ vm_dest_dir }} /mnt/storage/backups/production/$(date +\\%Y-\\%m-\\%d)"
        user: vmadmin