---
- name: Phase 2 - Production Deployment
  hosts: homelab
  become: true
  vars_files:
    - "/opt/vmstation-org/cluster-setup/ansible/inventory/group_vars/compute_nodes.yml"
  vars:
    project_root: "/home/vmadmin/vmstation-org/cluster-vm-thinclient"
    terraform_dir: "{{ project_root }}/terraform"
    # NFS Read-only source
    template_path: "/mnt/media/iso/win11e/win11-template.vmx"
    # Local production destination
    vm_dest_dir: "/mnt/storage/vmware/win11-production"
    vm_dest_vmx: "/mnt/storage/vmware/win11-production/win11-production.vmx"

  tasks:
    - name: Install Terraform and dependencies
      shell: |
        dnf install -y dnf-plugins-core
        dnf config-manager --add-repo https://rpm.releases.hashicorp.com/RHEL/hashicorp.repo
        dnf install -y terraform
      args:
        creates: /usr/bin/terraform

    - name: Sync Terraform codebase
      ansible.posix.synchronize:
        src: "../../terraform/"
        dest: "{{ terraform_dir }}/"
        recursive: yes
        delete: yes

    - name: Fix directory ownership (CRITICAL FIX)
      file:
        path: "{{ project_root }}"
        owner: vmadmin
        group: vmadmin
        recurse: yes

    - name: Fix duplicate variable declaration in variables.tf
      lineinfile:
        path: "{{ terraform_dir }}/variables.tf"
        regexp: '^variable "sourceid"'
        state: absent
        firstmatch: false

    - name: Ensure deployment directory exists
      file:
        path: "{{ vm_dest_dir }}"
        state: directory
        owner: vmadmin
        group: vmadmin

    - name: Terraform Apply
      shell: |
        terraform init -upgrade
        terraform apply -auto-approve \
          -var="vmws_pass={{ vmws_pass }}" \
          -var="sourceid={{ template_path }}" \
          -var="dest_path={{ vm_dest_vmx }}" \
          -var="vm_name=win11-production"
      args:
        chdir: "{{ terraform_dir }}"
      become_user: vmadmin

    - name: Configure 100% Uptime Service
      copy:
        dest: /etc/systemd/system/win11-production.service
        content: |
          [Unit]
          Description=Windows 11 Production VM
          After=network.target vmware.service
          Requires=vmware.service

          [Service]
          Type=forking
          ExecStart=/usr/bin/vmrun -T ws start "{{ vm_dest_vmx }}" nogui
          ExecStop=/usr/bin/vmrun -T ws stop "{{ vm_dest_vmx }}" soft
          Restart=always
          RestartSec=30
          User=vmadmin

          [Install]
          WantedBy=multi-user.target

    - name: Enable and Start VM
      systemd:
        name: win11-production
        enabled: true
        state: started
        daemon_reload: true

    - name: Setup Automated Backups
      cron:
        name: "Nightly Win11 Backup"
        minute: "0"
        hour: "2"
        job: "/usr/bin/vmrun -T ws snapshot {{ vm_dest_vmx }} Backup-$(date +\\%Y-\\%m-\\%d) && cp -r {{ vm_dest_dir }} /mnt/storage/backups/production/$(date +\\%Y-\\%m-\\%d)"
        user: vmadmin