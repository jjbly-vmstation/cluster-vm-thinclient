---
- name: Phase 2 - Production Deployment
  hosts: homelab
  become: true
  vars_files:
    - "/opt/vmstation-org/cluster-setup/ansible/inventory/group_vars/compute_nodes.yml"
  vars:
    project_root: "/home/vmadmin/vmstation-org/cluster-vm-thinclient"
    terraform_dir: "{{ project_root }}/terraform"
    
    # Template Paths
    template_nfs_dir: "/mnt/media/iso/win11e"
    template_local_dir: "/mnt/storage/vmware/win11-template"
    template_local_vmx: "{{ template_local_dir }}/win11-template.vmx"
    
    # Production Paths
    vm_dest_dir: "/mnt/storage/vmware/win11-production"
    vm_dest_vmx: "{{ vm_dest_dir }}/win11-production.vmx"

  tasks:
    - name: 1. Cleanup previous failed attempts and artifacts
      shell: |
        rm -rf /mnt/storage/vmware/packer*
        rm -rf "{{ template_local_dir }}"
        rm -rf "{{ vm_dest_dir }}"
      ignore_errors: true

    - name: 2. Sync Terraform codebase
      ansible.posix.synchronize:
        src: "../../terraform/"
        dest: "{{ terraform_dir }}/"
        recursive: yes
        delete: yes

    - name: 3. Fix directory ownership for project root
      file:
        path: "{{ project_root }}"
        owner: vmadmin
        group: vmadmin
        recurse: yes

    - name: 4. Ensure local writable template directory exists
      file:
        path: "{{ template_local_dir }}"
        state: directory
        owner: vmadmin
        group: vmadmin
        mode: '0755'

    - name: 5. Stage Packer template from read-only NFS
      ansible.posix.synchronize:
        src: "{{ template_nfs_dir }}/"
        dest: "{{ template_local_dir }}/"
      delegate_to: "{{ inventory_hostname }}"

    - name: 6. Strip hardware identity to force VMware to generate new ones
      lineinfile:
        path: "{{ template_local_vmx }}"
        regexp: "{{ item }}"
        state: absent
      loop:
        - '(?i)^uuid\.bios.*'
        - '(?i)^uuid\.location.*'
        - '(?i)^vmci0\.id.*'
        - '(?i)^ethernet0\.generatedAddress.*'

    - name: 7. CRITICAL FIX - Purge stale auxiliary files to prevent API corruption flags
      file:
        path: "{{ template_local_dir }}/{{ item }}"
        state: absent
      loop:
        - win11-template.vmxf
        - win11-template.vmsd
        - win11-template.scoreboard
        - vmware.log

    - name: 8. Set auto-accept and creation flags uniquely
      lineinfile:
        path: "{{ template_local_vmx }}"
        regexp: "{{ item.regexp }}"
        line: "{{ item.line }}"
      loop:
        - { regexp: '(?i)^msg\.autoanswer\s*=', line: 'msg.autoanswer = "TRUE"' }
        - { regexp: '(?i)^uuid\.action\s*=', line: 'uuid.action = "create"' }

    - name: 9. Restore SELinux context for RHEL security compliance
      shell: "restorecon -Rv {{ template_local_dir }} || true"

    - name: 10. Fix ownership of edited template files
      file:
        path: "{{ template_local_dir }}"
        owner: vmadmin
        group: vmadmin
        recurse: yes
        mode: '0755'

    - name: 11. Kill any hanging VMware processes
      shell: "pkill -9 vmrest || true; pkill -9 vmrun || true"
      ignore_errors: true

    - name: 12. Force VMware to generate UUIDs via NATIVE login shell
      shell: |
        su - vmadmin -c '/usr/bin/vmrun -T ws start "{{ template_local_vmx }}" nogui'
        sleep 10
        su - vmadmin -c '/usr/bin/vmrun -T ws stop "{{ template_local_vmx }}" hard'
      args:
        executable: /bin/bash

    - name: 13. Ensure VMware user directory exists
      file:
        path: "/home/vmadmin/.vmware"
        state: directory
        owner: vmadmin
        group: vmadmin
        mode: '0700'

    - name: 14. Manually force VM into Workstation inventory database
      copy:
        dest: "/home/vmadmin/.vmware/inventory.vmls"
        content: |
          .encoding = "UTF-8"
          vmlist.config.0 = "{{ template_local_vmx }}"
          vmlist.index = "1"
        owner: vmadmin
        group: vmadmin
        mode: '0600'

    - name: 15. Start API service via NATIVE login shell
      shell: "su - vmadmin -c 'nohup /usr/bin/vmrest > /home/vmadmin/vmrest.log 2>&1 &'"
      args:
        executable: /bin/bash

    - name: 16. Wait for API to fully settle
      wait_for:
        port: 8697
        delay: 5

    - name: 17. Query API for VM ID (With Retries)
      uri:
        url: "http://127.0.0.1:8697/api/vms"
        method: GET
        url_username: vmadmin
        url_password: "{{ vmws_pass }}"
        force_basic_auth: yes
      register: api_response
      retries: 5
      delay: 5
      until: api_response.json | length > 0

    - name: 18. Extract Template VM ID
      set_fact:
        template_vm_id: "{{ api_response.json[0].id }}"

    - name: 19. Terraform Apply
      shell: |
        terraform init
        terraform apply -auto-approve \
          -var="vmws_pass={{ vmws_pass }}" \
          -var="sourceid={{ template_vm_id }}"
      args:
        chdir: "{{ terraform_dir }}"
      become_user: vmadmin

    - name: 20. Configure 100% Uptime Service (Systemd)
      copy:
        dest: /etc/systemd/system/win11-production.service
        content: |
          [Unit]
          Description=Windows 11 Production VM
          After=network.target vmware.service
          Requires=vmware.service

          [Service]
          Type=forking
          ExecStart=/usr/bin/vmrun -T ws start "{{ vm_dest_vmx }}" nogui
          ExecStop=/usr/bin/vmrun -T ws stop "{{ vm_dest_vmx }}" soft
          Restart=always
          RestartSec=30
          User=vmadmin

          [Install]
          WantedBy=multi-user.target

    - name: 21. Enable and Start VM
      systemd:
        name: win11-production
        enabled: true
        state: started
        daemon_reload: true

    - name: 22. Setup Automated Nightly Backups
      cron:
        name: "Nightly Windows 11 Backup"
        minute: "0"
        hour: "2"
        job: "/usr/bin/rsync -a --delete {{ vm_dest_dir }}/ /mnt/storage/backups/win11-production/"
        user: vmadmin