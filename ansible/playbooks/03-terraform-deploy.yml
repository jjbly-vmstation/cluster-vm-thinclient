---
- name: Phase 2 - Production Deployment
  hosts: homelab
  become: true
  vars_files:
    - "/opt/vmstation-org/cluster-setup/ansible/inventory/group_vars/compute_nodes.yml"
  vars:
    # Manual Configuration Note:
    # I had to manually add the location of the VM in the VMware Workstation 
    # GUI (logged in as vmadmin) to register the VM without errors. 
    # This populates the inventory.vmls file which the API requires.

    project_root: "/home/vmadmin/vmstation-org/cluster-vm-thinclient"
    terraform_dir: "{{ project_root }}/terraform"
    
    # Template and Production Paths
    template_local_vmx: "/mnt/storage/vmware/win11-template/win11-template.vmx"
    vm_dest_dir: "/mnt/storage/vmware/win11-production"
    vm_dest_vmx: "{{ vm_dest_dir }}/win11-production.vmx"

  tasks:
    - name: 1. Ensure vmrest Systemd Service is Configured
      copy:
        dest: /etc/systemd/system/vmrest.service
        content: |
          [Unit]
          Description=VMware Workstation REST API
          After=network.target vmware.service
          Requires=vmware.service

          [Service]
          Type=simple
          User={{ vm_admin_user }}
          Group={{ vm_admin_user }}
          # dbus-run-session is required on RHEL 10 for the API to access the GUI-registered inventory
          ExecStart=/usr/bin/dbus-run-session -- /usr/bin/vmrest -p {{ vmrest_port }} -i {{ vmrest_host }}
          Restart=always
          RestartSec=5

          [Install]
          WantedBy=multi-user.target

    - name: 2. Set vmrest Credentials (Non-Interactive)
      shell: |
        (echo "{{ vmws_user }}"; echo "{{ vmws_pass }}"; echo "{{ vmws_pass }}") | /usr/bin/vmrest -C
      become_user: "{{ vm_admin_user }}"
      changed_when: false

    - name: 3. Restart vmrest Service
      systemd:
        name: vmrest
        state: restarted
        enabled: yes
        daemon_reload: yes

    - name: 4. Wait for API Availability
      wait_for:
        port: "{{ vmrest_port }}"
        host: "127.0.0.1"
        timeout: 30

    - name: 5. Query API for Template ID
      uri:
        url: "http://127.0.0.1:{{ vmrest_port }}/api/vms"
        method: GET
        user: "{{ vmws_user }}"
        password: "{{ vmws_pass }}"
        force_basic_auth: yes
      register: api_response
      retries: 5
      delay: 5
      until: api_response.json | length > 0

    - name: 6. Extract Specific Template ID
      set_fact:
        template_vm_id: "{{ (api_response.json | selectattr('path', 'equalto', template_local_vmx) | list | first).id }}"

    - name: 7. Run Terraform Deployment
      shell: |
        terraform init
        terraform apply -auto-approve \
          -var="vmws_pass={{ vmws_pass }}" \
          -var="sourceid={{ template_vm_id }}"
      args:
        chdir: "{{ terraform_dir }}"
      become_user: "{{ vm_admin_user }}"

    - name: 8. Configure 100% Uptime Service for Production VM
      copy:
        dest: /etc/systemd/system/win11-production.service
        content: |
          [Unit]
          Description=Windows 11 Production VM
          After=network.target vmware.service
          Requires=vmware.service

          [Service]
          Type=forking
          ExecStart=/usr/bin/vmrun -T ws start "{{ vm_dest_vmx }}" nogui
          ExecStop=/usr/bin/vmrun -T ws stop "{{ vm_dest_vmx }}" soft
          User={{ vm_admin_user }}
          Restart=always

    - name: 9. Ensure Production VM is Started
      systemd:
        name: win11-production
        state: started
        enabled: yes
        daemon_reload: yes