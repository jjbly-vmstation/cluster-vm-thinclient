---
- name: Phase 3 - Deploy VM from Golden Image via Terraform
  hosts: wsdc-homelab
  gather_facts: true
  vars:
    ansible_connection: ssh
    ansible_shell_type: powershell
    ansible_user: 'VMSTATION\ansible_svc'
    ansible_ssh_common_args: '-o ProxyCommand=none'
    terraform_dir: "C:\\vmstation-org\\cluster-vm-thinclient\\terraform"
    nfs_output: "\\\\192.168.4.61\\srv\\media\\iso\\win11e"
  vars_files:
    - /opt/vmstation-org/cluster-vm-thinclient/ansible/group_vars/all.yml

  tasks:
    - name: 1. Ensure Terraform directory exists
      ansible.windows.win_file:
        path: "{{ terraform_dir }}"
        state: directory

    - name: 2. Copy Terraform files
      ansible.windows.win_copy:
        src: "{{ item }}"
        dest: "{{ terraform_dir }}\\{{ item | basename }}"
      loop:
        - /opt/vmstation-org/cluster-vm-thinclient/terraform/main.tf
        - /opt/vmstation-org/cluster-vm-thinclient/terraform/variables.tf
        - /opt/vmstation-org/cluster-vm-thinclient/terraform/outputs.tf
        - /opt/vmstation-org/cluster-vm-thinclient/terraform/terraform.tfvars

    - name: 2.5 Ensure Terraform is installed
      ansible.windows.win_shell: |
        if (-not (Test-Path "C:\Terraform\terraform.exe")) {
          Invoke-WebRequest -Uri "https://releases.hashicorp.com/terraform/1.10.5/terraform_1.10.5_windows_amd64.zip" -OutFile "C:\Windows\Temp\terraform.zip" -UseBasicParsing
          New-Item -ItemType Directory -Force -Path "C:\Terraform"
          Expand-Archive "C:\Windows\Temp\terraform.zip" -DestinationPath "C:\Terraform" -Force
        }
      args:
        creates: "C:\\Terraform\\terraform.exe"

    - name: 3. Ensure VM VHDX directory exists on F RAID10
      ansible.windows.win_file:
        path: "F:\\Hyper-V\\Virtual Hard Disks\\{{ vm_name | default('win11-production') }}"
        state: directory

    - name: 4. Verify NFS Z drive is mounted
      ansible.windows.win_shell: |
        if (-not (Test-Path "\\192.168.4.61\srv\media\iso\win11e\win11-template\Virtual Hard Disks\win11-template.vhdx")) {
          throw "Golden VHDX not found"
        }

    - name: 4.9 Ensure Golden staging directory exists
      ansible.windows.win_file:
        path: "F:\\Hyper-V\\Golden"
        state: directory

    - name: 5. Copy golden VHDX for this VM
      ansible.windows.win_shell: |
        $dest = "F:\Hyper-V\Virtual Hard Disks\{{ vm_name }}"
        New-Item -ItemType Directory -Force -Path $dest
        robocopy "F:\Hyper-V\Golden" $dest "win11-base.vhdx" /J /NP
        Rename-Item "$dest\win11-base.vhdx" "{{ vm_name }}.vhdx" -ErrorAction SilentlyContinue
      args:
        creates: "F:\\Hyper-V\\Virtual Hard Disks\\{{ vm_name }}\\{{ vm_name }}.vhdx"

    - name: 5.6 Terraform Init
      ansible.windows.win_shell: |
        C:\Terraform\terraform.exe init -upgrade
      args:
        chdir: "C:\\home\\vmadmin\\vmstation-org\\cluster-vm-thinclient\\terraform"
      register: tf_init

    - name: 6. Terraform Plan
      ansible.windows.win_shell: |
        C:\Terraform\terraform.exe plan `
          -var="hyperv_password={{ vm_password }}" `
          -var="vm_name={{ vm_name | default('win11-production') }}" `
          -out=tfplan
      args:
        chdir: "C:\\home\\vmadmin\\vmstation-org\\cluster-vm-thinclient\\terraform"
      register: tf_plan

    - name: 7. Terraform Apply
      ansible.windows.win_shell: |
        C:\Terraform\terraform.exe apply -auto-approve tfplan
      args:
        chdir: "C:\\home\\vmadmin\\vmstation-org\\cluster-vm-thinclient\\terraform"
      register: tf_apply

    - name: 8. Show Apply Output
      ansible.builtin.debug:
        msg: "{{ tf_apply.stdout_lines }}"
