---
- name: Phase 2 - Production Deployment
  hosts: homelab
  become: true
  vars_files:
    - "/opt/vmstation-org/cluster-setup/ansible/inventory/group_vars/compute_nodes.yml"
  vars:
    project_root: "/home/vmadmin/vmstation-org/cluster-vm-thinclient"
    terraform_dir: "{{ project_root }}/terraform"
    
    # Template Paths
    template_nfs_dir: "/mnt/media/iso/win11e"
    template_local_dir: "/mnt/storage/vmware/win11-template"
    template_local_vmx: "{{ template_local_dir }}/win11-template.vmx"
    
    # Production Paths
    vm_dest_dir: "/mnt/storage/vmware/win11-production"
    vm_dest_vmx: "{{ vm_dest_dir }}/win11-production.vmx"

  tasks:
    - name: Cleanup previous failed attempts and artifacts
      shell: |
        rm -rf /mnt/storage/vmware/packer*
        rm -rf "{{ template_local_dir }}"
        rm -rf "{{ vm_dest_dir }}"
      ignore_errors: true

    - name: Sync Terraform codebase
      ansible.posix.synchronize:
        src: "../../terraform/"
        dest: "{{ terraform_dir }}/"
        recursive: yes
        delete: yes

    - name: Ensure local writable template directory exists
      file:
        path: "{{ template_local_dir }}"
        state: directory
        owner: vmadmin
        group: vmadmin
        mode: '0755'

    - name: Stage Packer template from read-only NFS
      ansible.posix.synchronize:
        src: "{{ template_nfs_dir }}/"
        dest: "{{ template_local_dir }}/"
      delegate_to: "{{ inventory_hostname }}"

    - name: Strip hardware identity and pre-answer move prompt
      lineinfile:
        path: "{{ template_local_vmx }}"
        regexp: "{{ item.regexp }}"
        state: absent
      loop:
        - { regexp: '^uuid\..*' }
        - { regexp: '^vmci0\.id.*' }
        - { regexp: '^ethernet0\.generatedAddress.*' }

    - name: Set auto-accept and creation flags
      blockinfile:
        path: "{{ template_local_vmx }}"
        block: |
          uuid.action = "create"
          msg.autoanswer = "TRUE"
      become_user: vmadmin

    - name: Ensure VMware configuration directory exists
      file:
        path: "/home/vmadmin/.vmware"
        state: directory
        owner: vmadmin
        group: vmadmin
        mode: '0700'

    - name: Manually force VM into inventory database
      copy:
        dest: "/home/vmadmin/.vmware/inventory.vmls"
        content: |
          .encoding = "UTF-8"
          vmlist.config.0 = "{{ template_local_vmx }}"
          vmlist.index = "1"
        owner: vmadmin
        group: vmadmin
        mode: '0600'

    - name: Kill any hanging VMware processes
      shell: "pkill -9 vmrest || true; pkill -9 vmrun || true"
      ignore_errors: true

    - name: Start API service with explicit home directory
      shell: "nohup /usr/bin/vmrest > /home/vmadmin/vmrest.log 2>&1 &"
      become_user: vmadmin
      environment:
        HOME: "/home/vmadmin"

    - name: Wait for API to settle
      wait_for:
        port: 8697
        delay: 5

    - name: Query API for VM ID
      uri:
        url: "http://127.0.0.1:8697/api/vms"
        method: GET
        url_username: vmadmin
        url_password: "{{ vmws_pass }}"
        force_basic_auth: yes
      register: api_response
      retries: 3
      delay: 5
      until: api_response.json | length > 0

    - name: Extract Template VM ID
      set_fact:
        template_vm_id: "{{ api_response.json[0].id }}"

    - name: Terraform Apply
      shell: |
        terraform init
        terraform apply -auto-approve \
          -var="vmws_pass={{ vmws_pass }}" \
          -var="sourceid={{ template_vm_id }}"
      args:
        chdir: "{{ terraform_dir }}"
      become_user: vmadmin

    - name: Create Systemd service for production VM
      template:
        src: "../../templates/vm-service.j2" # Or use a 'copy' with 'content' as before
        dest: "/etc/systemd/system/win11-production.service"