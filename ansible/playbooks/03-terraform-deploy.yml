---
- name: Phase 2 - Production Deployment
  hosts: homelab
  become: true
  vars_files:
    - "/opt/vmstation-org/cluster-setup/ansible/inventory/group_vars/compute_nodes.yml"
  vars:
    project_root: "/home/vmadmin/vmstation-org/cluster-vm-thinclient"
    terraform_dir: "{{ project_root }}/terraform"
    
    # Template Paths
    template_nfs_dir: "/mnt/media/iso/win11e"
    template_local_dir: "/mnt/storage/vmware/win11-template"
    template_local_vmx: "{{ template_local_dir }}/win11-template.vmx"
    
    # Production Paths
    vm_dest_dir: "/mnt/storage/vmware/win11-production"
    vm_dest_vmx: "{{ vm_dest_dir }}/win11-production.vmx"

  tasks:
    - name: 1. Cleanup previous failed attempts and artifacts
      shell: |
        rm -rf /mnt/storage/vmware/packer*
        rm -rf "{{ template_local_dir }}"
        rm -rf "{{ vm_dest_dir }}"
      ignore_errors: true

    - name: 2. Sync Terraform codebase
      ansible.posix.synchronize:
        src: "../../terraform/"
        dest: "{{ terraform_dir }}/"
        recursive: yes
        delete: yes

    - name: 3. Ensure local writable template directory exists
      file:
        path: "{{ template_local_dir }}"
        state: directory
        owner: vmadmin
        group: vmadmin
        mode: '0755'

    - name: 4. Stage Packer template from read-only NFS
      ansible.posix.synchronize:
        src: "{{ template_nfs_dir }}/"
        dest: "{{ template_local_dir }}/"
      delegate_to: "{{ inventory_hostname }}"

    - name: 5. Purge all hardware identity and stale logs
      shell: |
        sed -i '/^uuid\./d' "{{ template_local_vmx }}"
        sed -i '/^vmci0\.id/d' "{{ template_local_vmx }}"
        sed -i '/^ethernet0\.generatedAddress/d' "{{ template_local_vmx }}"
        rm -f "{{ template_local_dir }}"/*.log
        rm -f "{{ template_local_dir }}"/*.vmxf
        rm -f "{{ template_local_dir }}"/*.vmsd

    - name: 6. Generate and Inject Fresh Hardware UUIDs
      shell: |
        raw_uuid=$(uuidgen)
        part1=$(echo $raw_uuid | cut -c 1-2); part2=$(echo $raw_uuid | cut -c 3-4); part3=$(echo $raw_uuid | cut -c 5-6); part4=$(echo $raw_uuid | cut -c 7-8)
        part5=$(echo $raw_uuid | cut -c 10-11); part6=$(echo $raw_uuid | cut -c 12-13); part7=$(echo $raw_uuid | cut -c 15-16); part8=$(echo $raw_uuid | cut -c 17-18)
        part9=$(echo $raw_uuid | cut -c 20-21); part10=$(echo $raw_uuid | cut -c 22-23); part11=$(echo $raw_uuid | cut -c 25-26); part12=$(echo $raw_uuid | cut -c 27-28)
        part13=$(echo $raw_uuid | cut -c 29-30); part14=$(echo $raw_uuid | cut -c 31-32); part15=$(echo $raw_uuid | cut -c 33-34); part16=$(echo $raw_uuid | cut -c 35-36)
        formatted_uuid="$part1 $part2 $part3 $part4 $part5 $part6 $part7 $part8-$part9 $part10 $part11 $part12 $part13 $part14 $part15 $part16"
        
        # Inject directly to avoid Ansible marker issues
        echo "uuid.bios = \"$formatted_uuid\"" >> "{{ template_local_vmx }}"
        echo "uuid.location = \"$formatted_uuid\"" >> "{{ template_local_vmx }}"
        echo "msg.autoanswer = \"TRUE\"" >> "{{ template_local_vmx }}"
        echo "uuid.action = \"create\"" >> "{{ template_local_vmx }}"

    - name: 7. Fix Permissions and SELinux (Including Parent)
      shell: |
        chown -R vmadmin:vmadmin "{{ template_local_dir }}"
        chmod -R 755 "{{ template_local_dir }}"
        semanage fcontext -a -t virt_content_t "/mnt/storage/vmware(/.*)?" || true
        restorecon -Rv /mnt/storage/vmware

    - name: 8. Native Registration via D-Bus session (The "Secret Sauce")
      shell: |
        su - vmadmin -c 'dbus-run-session -- /usr/bin/vmrun -T ws list' | grep "{{ template_local_vmx }}" || \
        su - vmadmin -c 'dbus-run-session -- /usr/bin/vmrun -T ws start "{{ template_local_vmx }}" nogui'
        sleep 5
        su - vmadmin -c 'dbus-run-session -- /usr/bin/vmrun -T ws stop "{{ template_local_vmx }}" hard'
      args:
        executable: /bin/bash

    - name: 9. Restart API service via D-Bus session
      shell: |
        pkill -9 vmrest || true
        su - vmadmin -c 'nohup dbus-run-session -- /usr/bin/vmrest > /home/vmadmin/vmrest.log 2>&1 &'
      args:
        executable: /bin/bash

    - name: 10. Wait for API to fully settle
      wait_for:
        port: 8697
        delay: 5

    - name: 11. Query API for VM ID (With Retries)
      uri:
        url: "http://127.0.0.1:8697/api/vms"
        method: GET
        url_username: vmadmin
        url_password: "{{ vmws_pass }}"
        force_basic_auth: yes
      register: api_response
      retries: 5
      delay: 5
      until: api_response.json | length > 0

    - name: 12. Extract Template VM ID
      set_fact:
        template_vm_id: "{{ api_response.json[0].id }}"

    - name: 13. Terraform Apply
      shell: |
        terraform init
        terraform apply -auto-approve \
          -var="vmws_pass={{ vmws_pass }}" \
          -var="sourceid={{ template_vm_id }}"
      args:
        chdir: "{{ terraform_dir }}"
      become_user: vmadmin
      
    - name: 14. Configure Systemd and Backup
      copy:
        dest: /etc/systemd/system/win11-production.service
        content: |
          [Unit]
          Description=Windows 11 Production VM
          After=network.target vmware.service
          Requires=vmware.service

          [Service]
          Type=forking
          ExecStart=/usr/bin/vmrun -T ws start "{{ vm_dest_vmx }}" nogui
          ExecStop=/usr/bin/vmrun -T ws stop "{{ vm_dest_vmx }}" soft
          Restart=always
          RestartSec=30
          User=vmadmin

          [Install]
          WantedBy=multi-user.target

    - name: 15. Enable and Start VM
      systemd:
        name: win11-production
        enabled: true
        state: started
        daemon_reload: true