---
- name: Setup Windows VM Thin-Client with Terraform on homelab
  hosts: homelab
  become: true
  vars:
    terraform_version: "1.5.0"
    terraform_bin: "/usr/local/bin/terraform"
    terraform_dir: "/home/vmadmin/vmstation-org/cluster-vm-thinclient/terraform"
    terraform_src_dir: "{{ playbook_dir }}/../../terraform"
    force_vm_recreate: false # Set to true to force VM destruction and recreation
    vm_name: "windows-thinclient"

  tasks:
    - name: Ensure required packages are installed (Debian/Ubuntu)
      apt:
        name:
          - libvirt-daemon-system
          - libvirt-clients
          - qemu-kvm
          - unzip
          - wget
          - genisoimage
          - libvirt-dev
        state: present
        update_cache: true
      when: ansible_os_family == "Debian"

    - name: Ensure required packages are installed (RedHat/CentOS)
      yum:
        name:
          - libvirt
          - qemu-kvm
          - unzip
          - wget
          - genisoimage
          - swtpm
          - swtpm-tools
          - edk2-ovmf
        state: present
      when: ansible_os_family == "RedHat"

    - name: Remove existing Terraform binary to ensure correct version
      file:
        path: /usr/local/bin/terraform
        state: absent

    - name: Download Terraform binary
      command: wget https://releases.hashicorp.com/terraform/1.5.0/terraform_1.5.0_linux_amd64.zip -O /tmp/terraform.zip
      args:
        creates: /tmp/terraform.zip

    - name: Ensure unzip is installed
      package:
        name: unzip
        state: present

    - name: Unzip Terraform binary
      command: unzip /tmp/terraform.zip -d /usr/local/bin/
      args:
        creates: /usr/local/bin/terraform

    - name: Ensure Terraform is executable
      file:
        path: /usr/local/bin/terraform
        mode: '0755'

    - name: Allow VNC ports in firewall
      ansible.posix.firewalld:
        port: 5900-5905/tcp
        permanent: true
        state: enabled
        immediate: true
      when: ansible_os_family == "RedHat"

    - name: Create Terraform directory on homelab
      file:
        path: "{{ terraform_dir }}"
        state: directory
        owner: vmadmin
        group: vmadmin
        mode: '0755'

    - name: Copy Terraform files from controller to homelab
      synchronize:
        src: "{{ terraform_src_dir }}/"
        dest: "{{ terraform_dir }}/"
        mode: push
        rsync_opts:
          - "--exclude=.terraform"
          - "--exclude=.terraform.lock.hcl"
    - name: Ensure Terraform directory and files are owned by vmadmin
      file:
        path: "{{ terraform_dir }}"
        state: directory
        owner: vmadmin
        group: vmadmin
        recurse: yes

    - name: Check if VirtIO ISO already exists on homelab
      stat:
        path: "/home/vmadmin/iso/virtio-win.iso"
      register: homelab_iso

    - name: Copy VirtIO drivers ISO to homelab (only if changed)
      copy:
        src: "/tmp/virtio-win.iso"
        dest: "/home/vmadmin/iso/virtio-win.iso"
        owner: vmadmin
        group: vmadmin
        mode: '0644'
      when: not homelab_iso.stat.exists

    - name: Forcefully stop any lingering VM domain
      command: "virsh destroy {{ vm_name }}"
      register: virsh_destroy
      changed_when: virsh_destroy.rc == 0
      failed_when: false # Ignore errors if VM doesn't exist or isn't running
      when: force_vm_recreate

    - name: Undefine any lingering VM and delete NVRAM to ensure clean state
      command: "virsh undefine {{ vm_name }} --nvram"
      register: virsh_undefine
      changed_when: virsh_undefine.rc == 0
      failed_when: false # Ignore errors if VM doesn't exist
      when: force_vm_recreate
    - name: Run terraform init
      command: "{{ terraform_bin }} init -upgrade -reconfigure"
      args:
        chdir: "{{ terraform_dir }}"
      become_user: vmadmin

    - name: Check Terraform providers (debug)
      command: "{{ terraform_bin }} providers"
      args:
        chdir: "{{ terraform_dir }}"
      become_user: vmadmin
      register: tf_providers

    - name: Check Terraform version (debug)
      command: "{{ terraform_bin }} version"
      args:
        chdir: "{{ terraform_dir }}"
      become_user: vmadmin
      register: tf_version

    - name: Display Terraform providers
      debug:
        msg: 
          - "Providers: {{ tf_providers.stdout_lines }}"
          - "Version: {{ tf_version.stdout_lines }}"
    
    - name: Check for OVMF Code file
      stat:
        path: /usr/share/edk2/ovmf/OVMF_CODE.secboot.fd
      register: ovmf_code_stat

    - name: Fail if OVMF Code is missing
      fail:
        msg: "Required OVMF Code file missing: /usr/share/edk2/ovmf/OVMF_CODE.secboot.fd"
      when: not ovmf_code_stat.stat.exists

    - name: Check for OVMF Variables Template candidates
      stat:
        path: "{{ item }}"
      register: ovmf_vars_check
      loop:
        - /usr/share/edk2/ovmf/OVMF_VARS.secboot.fd
        - /usr/share/edk2/ovmf/OVMF_VARS.fd
        - /usr/share/edk2/ovmf/OVMF_VARS.ms.fd
        - /usr/share/OVMF/OVMF_VARS.secboot.fd
        - /usr/share/OVMF/OVMF_VARS.fd

    - name: Select first available OVMF Variables Template
      set_fact:
        ovmf_vars_path: "{{ ovmf_vars_check.results | selectattr('stat.exists') | map(attribute='item') | first | default('') }}"

    - name: Fail if no OVMF Variables Template found
      fail:
        msg: "Could not find a valid OVMF Variables Template. Checked standard RHEL paths."
      when: ovmf_vars_path == ''

    - name: Run terraform apply (auto-approve)
      command: >
        {{ terraform_bin }} apply -auto-approve 
        -var='libvirt_uri=qemu:///system' 
        -var='firmware_path=/usr/share/edk2/ovmf/OVMF_CODE.secboot.fd' 
        -var='nvram_template={{ ovmf_vars_path }}'
      args:
        chdir: "{{ terraform_dir }}"
      become_user: vmadmin
