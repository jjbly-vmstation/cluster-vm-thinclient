---
- name: Setup Windows VM Thin-Client with Terraform on homelab
  hosts: homelab
  become: true
  vars:
    terraform_version: "1.5.0"
    terraform_bin: "/usr/local/bin/terraform"
    terraform_dir: "/home/vmadmin/vmstation-org/cluster-vm-thinclient/terraform"
    terraform_src_dir: "{{ playbook_dir }}/../../terraform"
    force_vm_recreate: false # Set to true to force VM destruction and recreation
    vm_name: "windows-thinclient"

  tasks:
    - name: Ensure required packages are installed (Debian/Ubuntu)
      apt:
        name:
          - libvirt-daemon-system
          - libvirt-clients
          - qemu-kvm
          - unzip
          - wget
          - genisoimage
          - libvirt-dev
        state: present
        update_cache: true
      when: ansible_os_family == "Debian"

    - name: Ensure required packages are installed (RedHat/CentOS)
      yum:
        name:
          - libvirt
          - qemu-kvm
          - unzip
          - wget
          - genisoimage
          - swtpm
          - swtpm-tools
          - edk2-ovmf
        state: present
      when: ansible_os_family == "RedHat"

    - name: Remove existing Terraform binary to ensure correct version
      file:
        path: /usr/local/bin/terraform
        state: absent

    - name: Download Terraform binary
      command: wget https://releases.hashicorp.com/terraform/1.5.0/terraform_1.5.0_linux_amd64.zip -O /tmp/terraform.zip
      args:
        creates: /tmp/terraform.zip

    - name: Ensure unzip is installed
      package:
        name: unzip
        state: present

    - name: Unzip Terraform binary
      command: unzip /tmp/terraform.zip -d /usr/local/bin/
      args:
        creates: /usr/local/bin/terraform

    - name: Ensure Terraform is executable
      file:
        path: /usr/local/bin/terraform
        mode: '0755'

    - name: Allow VNC ports in firewall
      ansible.posix.firewalld:
        port: 5900-5905/tcp
        permanent: true
        state: enabled
        immediate: true
      when: ansible_os_family == "RedHat"

    - name: Create Terraform directory on homelab
      file:
        path: "{{ terraform_dir }}"
        state: directory
        owner: vmadmin
        group: vmadmin
        mode: '0755'

    - name: Copy Terraform files from controller to homelab
      synchronize:
        src: "{{ terraform_src_dir }}/"
        dest: "{{ terraform_dir }}/"
        mode: push
        rsync_opts:
          - "--exclude=.terraform"
          - "--exclude=.terraform.lock.hcl"
    - name: Ensure Terraform directory and files are owned by vmadmin
      file:
        path: "{{ terraform_dir }}"
        state: directory
        owner: vmadmin
        group: vmadmin
        recurse: yes

    - name: Ensure ISO directory exists
      file:
        path: "/home/vmadmin/iso"
        state: directory
        owner: vmadmin
        group: vmadmin
        mode: '0755'

    - name: Download VirtIO drivers ISO (stable)
      command: wget -O /home/vmadmin/iso/virtio-win.iso https://fedorapeople.org/groups/virt/virtio-win/direct-downloads/stable-virtio/virtio-win.iso
      args:
        creates: /home/vmadmin/iso/virtio-win.iso

    - name: Ensure VirtIO ISO permissions
      file:
        path: /home/vmadmin/iso/virtio-win.iso
        owner: vmadmin
        group: vmadmin
        mode: '0644'

    - name: Forcefully stop any lingering VM domain
      command: "virsh destroy {{ vm_name }}"
      register: virsh_destroy
      changed_when: virsh_destroy.rc == 0
      failed_when: false # Ignore errors if VM doesn't exist or isn't running
      when: force_vm_recreate

    - name: Undefine any lingering VM and delete NVRAM to ensure clean state
      command: "virsh undefine {{ vm_name }} --nvram"
      register: virsh_undefine
      changed_when: virsh_undefine.rc == 0
      failed_when: false # Ignore errors if VM doesn't exist
      when: force_vm_recreate
    - name: Run terraform init
      command: "{{ terraform_bin }} init -upgrade -reconfigure"
      args:
        chdir: "{{ terraform_dir }}"
      become_user: vmadmin

    - name: Check Terraform providers (debug)
      command: "{{ terraform_bin }} providers"
      args:
        chdir: "{{ terraform_dir }}"
      become_user: vmadmin
      register: tf_providers

    - name: Check Terraform version (debug)
      command: "{{ terraform_bin }} version"
      args:
        chdir: "{{ terraform_dir }}"
      become_user: vmadmin
      register: tf_version

    - name: Display Terraform providers
      debug:
        msg: 
          - "Providers: {{ tf_providers.stdout_lines }}"
          - "Version: {{ tf_version.stdout_lines }}"

    - name: Find OVMF firmware files on host system
      find:
        paths: /usr/share
        patterns: ["*OVMF_CODE*.fd", "*OVMF_VARS*.fd"]
        file_type: file
        follow: yes
        recurse: yes
      register: ovmf_files_found

    - name: Debug found OVMF files
      debug:
        msg: "Found files: {{ ovmf_files_found.files | map(attribute='path') | list }}"

    - name: Set found OVMF file paths
      set_fact:
        ovmf_code_src_path: "{{ (ovmf_files_found.files | selectattr('path', 'search', '(?i)OVMF_CODE.*secboot.*\\.fd') | map(attribute='path') | first) | default(ovmf_files_found.files | selectattr('path', 'search', '(?i)OVMF_CODE.*\\.fd') | map(attribute='path') | first) | default('') }}"
        ovmf_vars_src_path: "{{ (ovmf_files_found.files | selectattr('path', 'search', '(?i)OVMF_VARS.*secboot.*\\.fd') | map(attribute='path') | first) | default(ovmf_files_found.files | selectattr('path', 'search', '(?i)OVMF_VARS.*\\.fd') | map(attribute='path') | first) | default('') }}"

    - name: Fail if OVMF files are not found
      fail:
        msg: |
          Could not find required OVMF files (OVMF_CODE.secboot.fd, OVMF_VARS.fd) in /usr/share.
          Please ensure the 'edk2-ovmf' package is installed and provides these files.
          Debug Info:
          OVMF_CODE.secboot.fd found at: {{ ovmf_code_src_path }}
          OVMF_VARS.fd found at: {{ ovmf_vars_src_path }}
      when: ovmf_code_src_path == '' or ovmf_vars_src_path == ''

    - name: Create a controlled firmware directory for the VM
      file:
        path: "/home/vmadmin/disks/firmware"
        state: directory
        owner: vmadmin
        group: vmadmin
        mode: '0755'

    - name: Copy OVMF files to controlled directory
      copy:
        src: "{{ item.src }}"
        dest: "{{ item.dest }}"
        remote_src: yes
        owner: vmadmin
        group: vmadmin
        mode: '0644'
      loop:
        - { src: "{{ ovmf_code_src_path }}", dest: "/home/vmadmin/disks/firmware/OVMF_CODE.secboot.fd" }
        - { src: "{{ ovmf_vars_src_path }}", dest: "/home/vmadmin/disks/firmware/OVMF_VARS.fd" }

    - name: Ensure semanage is available for permanent SELinux changes
      yum:
        name: policycoreutils-python-utils
        state: present
      when: ansible_os_family == "RedHat"
    - name: Set permanent SELinux context for controlled firmware directory
      command: "semanage fcontext -a -t svirt_image_t '/home/vmadmin/disks/firmware(/.*)?'"
      register: semanage_result
      changed_when: "'already defined' not in semanage_result.stderr"
      failed_when: semanage_result.rc != 0 and 'already defined' not in semanage_result.stderr
      when: ansible_os_family == "RedHat"

    - name: Apply SELinux context to controlled firmware directory
      command: "restorecon -Rv /home/vmadmin/disks/firmware"
      register: restorecon_result
      changed_when: "'Relabeled' in restorecon_result.stdout"
      when: ansible_os_family == "RedHat"

    - name: Run terraform apply (auto-approve)
      command: >
        {{ terraform_bin }} apply -auto-approve 
        -var='libvirt_uri=qemu:///system' 
        -var='firmware_path=/home/vmadmin/disks/firmware/OVMF_CODE.secboot.fd' 
        -var='nvram_template=/home/vmadmin/disks/firmware/OVMF_VARS.fd'
      args:
        chdir: "{{ terraform_dir }}"
      become_user: vmadmin
