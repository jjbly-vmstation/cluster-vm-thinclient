---
- name: Setup VMware Workstation Environment on RHEL Homelab
  hosts: homelab
  become: true
  vars:
    terraform_version: "1.5.0"
    terraform_bin: "/usr/local/bin/terraform"
    terraform_dir: "/home/vmadmin/vmstation-org/cluster-vm-thinclient/terraform"
    terraform_src_dir: "{{ playbook_dir }}/../../terraform"
    vmws_user: "vmadmin"
    vmws_pass: "VMwareAPI123!"
    vmrest_port: 8697
    vm_admin_user: "vmadmin"
    iso_path: "/home/vmadmin/iso/en-us_windows_11_business_editions_version_25h2_updated_feb_2026_x64_dvd_9271bf68.iso"

  tasks:
    # 1. PREFLIGHT: ALIGN KERNEL AND HEADERS
    - name: Ensure kernel and headers are updated to the latest version
      yum:
        name: 
          - kernel
          - kernel-devel
          - kernel-headers
        state: latest
      register: kernel_update

    - name: Reboot homelab to apply new kernel (if updated)
      reboot:
        msg: "Rebooting to apply new kernel before compiling VMware modules"
        reboot_timeout: 600
      when: kernel_update.changed

    - name: Refresh Ansible facts after potential reboot
      setup:
      when: kernel_update.changed

    - name: Ensure build tools are present
      yum:
        name: [gcc, make, elfutils-libelf-devel, expect, wget, unzip]
        state: present

    # 2. INSTALLATION & KERNEL MODULES
    - name: Install VMware Workstation from bundle
      command: "/home/vmadmin/iso/VMware-Workstation-Full-25H2u1-25219725.x86_64.bundle --console --eulas-agreed --required"
      args:
        creates: /usr/lib/vmware

    - name: Link kernel headers for VMware (Safely)
      file:
        src: "/usr/src/kernels/{{ ansible_kernel }}"
        dest: "/lib/modules/{{ ansible_kernel }}/build"
        state: link
        force: yes
        follow: False # Suppresses the warning if run concurrently

    - name: Rebuild VMware Kernel Modules with explicit path
      shell: |
        export env VMWARE_USE_SHIPPED_LIBS=1
        vmware-modconfig --console --install-all
      register: modconfig_output
      failed_when: 
        - modconfig_output.rc != 0
        - "'Failed to setup build environment' in modconfig_output.stderr"




        
    # 3. CONFIGURATION (Credentials must exist for the service to bind)
    - name: Configure vmrest credentials via expect
      shell: |
        expect -c '
        spawn /usr/bin/vmrest -C
        expect "Username:"
        send "{{ vmws_user }}\r"
        expect "Password:"
        send "{{ vmws_pass }}\r"
        expect eof
        '
      no_log: true
      changed_when: true

    # 4. SYSTEMD SERVICE MANAGEMENT
    - name: Create systemd unit file for vmrest
      copy:
        dest: /etc/systemd/system/vmrest.service
        content: |
          [Unit]
          Description=VMware Workstation REST API Service
          After=network.target

          [Service]
          Type=simple
          User=root
          Environment=LD_LIBRARY_PATH=/usr/lib/vmware/lib
          ExecStart=/usr/bin/vmrest -i 0.0.0.0 -p {{ vmrest_port }}
          Restart=on-failure
          RestartSec=5

          [Install]
          WantedBy=multi-user.target
      notify: Reload Systemd

    - name: Force systemd reload if unit changed
      meta: flush_handlers

    - name: Ensure vmrest is enabled and running
      systemd:
        name: vmrest
        state: restarted
        enabled: yes

    - name: Wait for vmrest to be ready
      wait_for:
        port: "{{ vmrest_port }}"
        timeout: 30

    # 5. TERRAFORM DEPLOYMENT
    - name: Run terraform init
      command: "{{ terraform_bin }} init -upgrade"
      args:
        chdir: "{{ terraform_dir }}"
      become_user: "{{ vm_admin_user }}"

    - name: Run terraform apply
      command: >
        {{ terraform_bin }} apply -auto-approve
        -var='vmws_user={{ vmws_user }}'
        -var='vmws_password={{ vmws_pass }}'
        -var='iso_path={{ iso_path }}'
      args:
        chdir: "{{ terraform_dir }}"
      become_user: "{{ vm_admin_user }}"

  handlers:
    - name: Reload Systemd
      systemd:
        daemon_reload: yes