---
- name: Setup VMware Workstation Environment on RHEL Homelab
  hosts: homelab
  become: true
  vars:
    terraform_version: "1.5.0"
    terraform_bin: "/usr/local/bin/terraform"
    terraform_dir: "/home/vmadmin/vmstation-org/cluster-vm-thinclient/terraform"
    terraform_src_dir: "{{ playbook_dir }}/../../terraform"
    vmws_user: "vmadmin"
    vmws_pass: "VMwareAPI123!"
    vmrest_port: 8697
    vm_admin_user: "vmadmin"
    iso_path: "/home/vmadmin/iso/en-us_windows_11_business_editions_version_25h2_updated_feb_2026_x64_dvd_9271bf68.iso"

  tasks:
    # 1. DETERMINISTIC KERNEL ALIGNMENT
    - name: Detect running kernel version
      set_fact:
        running_kernel: "{{ ansible_kernel }}"

    - name: Ensure exact matching build environment is present
      yum:
        name:
          - "kernel-devel-{{ running_kernel }}"
          - "kernel-headers-{{ running_kernel }}"
          - gcc
          - make
          - elfutils-libelf-devel
        state: present
      register: kernel_pkg_result
      ignore_errors: true

    - name: Fail if matching headers are unavailable
      fail:
        msg: |
          FATAL: Matching headers for {{ running_kernel }} not found in repositories.
          Standard Engineering Practice: Ensure your base image (Golden Image) 
          is pre-synced or use a local Satellite/Repo mirror with legacy kernels.
      when: kernel_pkg_result.failed

    # 2. TARGETED MODULE COMPILATION
    - name: Rebuild VMware Kernel Modules
      shell: |
        export VMWARE_USE_SHIPPED_LIBS=1
        vmware-modconfig --console --install-all \
          --with-kernel-headers=/usr/src/kernels/{{ running_kernel }}
      register: modconfig_output
      # Industry standard: don't just check RC 1, check the stderr for environment issues
      failed_when: 
        - modconfig_output.rc != 0
        - "'Failed to setup build environment' in modconfig_output.stderr"




    # 3. CRITICAL LIBRARY SANITIZATION
    - name: Fix VMware broken library directories
      block:
        - name: Identify and remove fake library directories
          file:
            path: "/usr/lib/vmware/lib/{{ item.name }}"
            state: absent
          loop:
            - { name: 'libgcc_s.so.1', src: '/lib64/libgcc_s.so.1' }
            - { name: 'libglib-2.0.so.0', src: '/lib64/libglib-2.0.so.0' }
            - { name: 'libcrypto.so.3', src: '/lib64/libcrypto.so.3' }
            - { name: 'libssl.so.3', src: '/lib64/libssl.so.3' }
          register: lib_cleanup

        - name: Link to system-native libraries
          file:
            src: "{{ item.src }}"
            dest: "/usr/lib/vmware/lib/{{ item.name }}"
            state: link
            force: yes
          loop:
            - { name: 'libgcc_s.so.1', src: '/lib64/libgcc_s.so.1' }
            - { name: 'libglib-2.0.so.0', src: '/lib64/libglib-2.0.so.0' }
            - { name: 'libcrypto.so.3', src: '/lib64/libcrypto.so.3' }
            - { name: 'libssl.so.3', src: '/lib64/libssl.so.3' }
      when: ansible_os_family == "RedHat"


    # 3. CONFIGURATION (Credentials must exist for the service to bind)
    - name: Configure vmrest credentials via expect
      shell: |
        expect -c '
        spawn /usr/bin/vmrest -C
        expect "Username:"
        send "{{ vmws_user }}\r"
        expect "Password:"
        send "{{ vmws_pass }}\r"
        expect eof
        '
      no_log: true
      changed_when: true
    # 4. SYSTEMD SERVICE MANAGEMENT
    - name: Create systemd unit file for vmrest
      copy:
        dest: /etc/systemd/system/vmrest.service
        content: |
          [Unit]
          Description=VMware Workstation REST API Service
          After=network.target

          [Service]
          Type=simple
          User=root
          # Explicitly include all VMware lib paths for RHEL stability
          Environment="LD_LIBRARY_PATH=/usr/lib/vmware/lib:/usr/lib/vmware/lib/libconf"
          ExecStart=/usr/bin/vmrest -i 0.0.0.0 -p {{ vmrest_port }}
          Restart=on-failure
          RestartSec=5

          [Install]
          WantedBy=multi-user.target
      notify: Reload Systemd

    - name: Ensure port {{ vmrest_port }} is open in firewalld
      firewalld:
        port: "{{ vmrest_port }}/tcp"
        permanent: yes
        state: enabled
        immediate: yes
      ignore_errors: true # In case firewalld isn't running

    - name: Ensure vmrest is enabled and running
      systemd:
        name: vmrest
        state: restarted
        enabled: yes
        daemon_reload: yes

    - name: Wait for vmrest to be ready
      wait_for:
        host: 0.0.0.0
        port: "{{ vmrest_port }}"
        timeout: 45
        msg: "Timeout waiting for vmrest. Check 'journalctl -u vmrest' on the host."
    # 5. TERRAFORM DEPLOYMENT
    - name: Run terraform init
      command: "{{ terraform_bin }} init -upgrade"
      args:
        chdir: "{{ terraform_dir }}"
      become_user: "{{ vm_admin_user }}"

    - name: Run terraform apply
      command: >
        {{ terraform_bin }} apply -auto-approve
        -var='vmws_user={{ vmws_user }}'
        -var='vmws_password={{ vmws_pass }}'
        -var='iso_path={{ iso_path }}'
      args:
        chdir: "{{ terraform_dir }}"
      become_user: "{{ vm_admin_user }}"

  handlers:
    - name: Reload Systemd
      systemd:
        daemon_reload: yes