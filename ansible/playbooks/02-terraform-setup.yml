---
- name: Setup VMware Workstation Environment on RHEL Homelab
  hosts: homelab
  become: true
  vars:
    terraform_version: "1.5.0"
    terraform_bin: "/usr/local/bin/terraform"
    terraform_dir: "/home/vmadmin/vmstation-org/cluster-vm-thinclient/terraform"
    terraform_src_dir: "{{ playbook_dir }}/../../terraform"
    force_vm_recreate: false
    vm_name: "windows-11-enterprise"
    vmws_user: "vmadmin"
    vmws_pass: "VMwareAPI123!"  # Override via group_vars/all/local.yml
    vmware_bundle_url: ""        # Set this if you want automatic installation
    vmrest_port: 8697
    vm_admin_user: "vmadmin"

  tasks:
    # ============================================================
    # Preflight checks
    # ============================================================
    - name: Find Windows ISO in /home/vmadmin/iso
      find:
        paths: "/home/vmadmin/iso"
        patterns: "*windows*.iso"
      register: iso_search

    - name: Fail if no ISO found
      fail:
        msg: "No ISO file found in /home/vmadmin/iso. Please ensure a Windows ISO is present."
      when: iso_search.matched == 0

    - name: Set ISO path
      set_fact:
        iso_path: "{{ iso_search.files[0].path }}"

    - name: Verify that the Windows ISO exists
      stat:
        path: "{{ iso_path }}"
      register: iso_file
      failed_when: not iso_file.stat.exists

    - name: Ensure required packages are installed (prerequisites)
      yum:
        name:
          - kernel-devel
          - kernel-headers
          - gcc
          - make
          - glibc-headers
          - elfutils-libelf-devel
          - unzip
          - wget
        state: present
      when: ansible_os_family == "RedHat"

    # ============================================================
    # VMware Workstation installation (if not present)
    # ============================================================
    - name: Define VMware Workstation installation check path
      set_fact:
        vmware_installed_check: /usr/lib/vmware

    - name: Check if VMware Workstation is already installed
      stat:
        path: "{{ vmware_installed_check }}"
      register: vmware_installed

    - name: Download VMware Workstation bundle (if not installed)
      get_url:
        url: "{{ vmware_bundle_url }}"
        dest: /tmp/vmware-workstation.bundle
        mode: '0755'
      when:
        - not vmware_installed.stat.exists
        - vmware_bundle_url is defined and vmware_bundle_url | length > 0
      register: bundle_download

    - name: Fail if VMware not installed and no bundle URL provided
      fail:
        msg: "VMware Workstation is not installed and vmware_bundle_url is not set. Please install manually or provide the bundle URL."
      when:
        - not vmware_installed.stat.exists
        - vmware_bundle_url is not defined or vmware_bundle_url | length == 0

    - name: Install VMware Workstation from bundle
      command: /tmp/vmware-workstation.bundle --console --eulas-agreed --required
      args:
        creates: "{{ vmware_installed_check }}"
      when:
        - not vmware_installed.stat.exists
        - bundle_download is changed

    - name: Verify vmrest is available
      command: which vmrest
      register: vmrest_check
      changed_when: false
      failed_when: vmrest_check.rc != 0

    # ============================================================
    # Terraform installation
    # ============================================================
    - name: Remove existing Terraform binary to ensure correct version
      file:
        path: "{{ terraform_bin }}"
        state: absent

    - name: Download Terraform binary
      get_url:
        url: "https://releases.hashicorp.com/terraform/{{ terraform_version }}/terraform_{{ terraform_version }}_linux_amd64.zip"
        dest: /tmp/terraform.zip
        mode: '0644'
      register: download_terraform
      until: download_terraform is success
      retries: 3
      delay: 5

    - name: Ensure unzip is installed
      package:
        name: unzip
        state: present

    - name: Unzip Terraform binary
      unarchive:
        src: /tmp/terraform.zip
        dest: /usr/local/bin/
        remote_src: yes
        creates: "{{ terraform_bin }}"

    - name: Ensure Terraform is executable
      file:
        path: "{{ terraform_bin }}"
        mode: '0755'

    - name: Verify Terraform version
      command: "{{ terraform_bin }} --version"
      register: terraform_version_output
      changed_when: false

    # ============================================================
    # Prepare Terraform working directory
    # ============================================================
    - name: Create Terraform directory on homelab
      file:
        path: "{{ terraform_dir }}"
        state: directory
        owner: "{{ vm_admin_user }}"
        group: "{{ vm_admin_user }}"
        mode: '0755'

    - name: Copy Terraform files from controller to homelab
      become: false
      synchronize:
        src: "{{ terraform_src_dir }}/"
        dest: "{{ terraform_dir }}/"
        mode: push
        rsync_path: "sudo rsync"
        rsync_opts:
          - "--exclude=.terraform"
          - "--exclude=.terraform.lock.hcl"

    - name: Ensure Terraform directory and files are owned by vmadmin
      file:
        path: "{{ terraform_dir }}"
        state: directory
        owner: "{{ vm_admin_user }}"
        group: "{{ vm_admin_user }}"
        recurse: yes

    # ============================================================
    # VMware Workstation REST API (vmrest) configuration
    # ============================================================
    - name: Configure vmrest credentials
      command: "/usr/bin/vmrest -C -u {{ vmws_user }} -p {{ vmws_pass }}"
      register: vmrest_creds
      changed_when: vmrest_creds.rc == 0

    - name: Attempt to start vmrest via systemd (if service exists)
      systemd:
        name: vmware-workstation-server
        state: started
        enabled: yes
      ignore_errors: true
      register: systemd_result

    - name: Start vmrest as background process (fallback)
      shell: |
        nohup /usr/bin/vmrest > /var/log/vmrest.log 2>&1 &
      async: 10
      poll: 0
      when: systemd_result is failed or systemd_result is skipped

    - name: Wait for vmrest to be ready (port {{ vmrest_port }})
      wait_for:
        port: "{{ vmrest_port }}"
        host: localhost
        delay: 5
        timeout: 30
      register: vmrest_ready

    # ============================================================
    # Terraform execution
    # ============================================================
    - name: Run terraform init
      command: "{{ terraform_bin }} init -upgrade -reconfigure"
      args:
        chdir: "{{ terraform_dir }}"
      become_user: "{{ vm_admin_user }}"
      register: tf_init
      changed_when: "'Terraform has been successfully initialized' in tf_init.stdout"

    - name: Conditionally destroy existing VM if force_vm_recreate is true
      command: >
        {{ terraform_bin }} destroy -auto-approve
        -var='vmws_user={{ vmws_user }}'
        -var='vmws_password={{ vmws_pass }}'
        -var='iso_path={{ iso_path }}'
      args:
        chdir: "{{ terraform_dir }}"
      become_user: "{{ vm_admin_user }}"
      when: force_vm_recreate | bool

    - name: Run terraform apply (auto-approve)
      command: >
        {{ terraform_bin }} apply -auto-approve
        -var='vmws_user={{ vmws_user }}'
        -var='vmws_password={{ vmws_pass }}'
        -var='iso_path={{ iso_path }}'
      args:
        chdir: "{{ terraform_dir }}"
      become_user: "{{ vm_admin_user }}"
      register: tf_apply
      changed_when: "'Apply complete' in tf_apply.stdout"