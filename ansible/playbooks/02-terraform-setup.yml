---
- name: Setup VMware Workstation Environment on RHEL Homelab
  hosts: homelab
  become: true
  vars:
    terraform_version: "1.5.0"
    terraform_bin: "/usr/local/bin/terraform"
    terraform_dir: "/home/vmadmin/vmstation-org/cluster-vm-thinclient/terraform"
    terraform_src_dir: "{{ playbook_dir }}/../../terraform"
    force_vm_recreate: false # Set to true to force VM destruction and recreation
    vm_name: "windows-11-enterprise"
    vmws_user: "vmadmin"
    vmws_pass: "VMwareAPI123!" # CHANGEME: Use vault in production

  tasks:
    - name: Clean up KVM/Libvirt packages (Migration to VMware)
      yum:
        name:
          - libvirt
          - qemu-kvm
          - virt-install
          - virt-manager
        state: absent
      when: ansible_os_family == "RedHat"

    - name: Install VMware Workstation Prerequisites (RHEL)
      yum:
        name:
          - kernel-devel
          - kernel-headers
          - gcc
          - make
          - glibc-headers
          - elfutils-libelf-devel
          - unzip
          - wget
        state: present
      when: ansible_os_family == "RedHat"

    - name: Remove existing Terraform binary to ensure correct version
      file:
        path: /usr/local/bin/terraform
        state: absent

    - name: Download Terraform binary
      command: wget https://releases.hashicorp.com/terraform/1.5.0/terraform_1.5.0_linux_amd64.zip -O /tmp/terraform.zip
      args:
        creates: /tmp/terraform.zip

    - name: Ensure unzip is installed
      package:
        name: unzip
        state: present

    - name: Unzip Terraform binary
      command: unzip /tmp/terraform.zip -d /usr/local/bin/
      args:
        creates: /usr/local/bin/terraform

    - name: Ensure Terraform is executable
      file:
        path: /usr/local/bin/terraform
        mode: '0755'

    - name: Create Terraform directory on homelab
      file:
        path: "{{ terraform_dir }}"
        state: directory
        owner: vmadmin
        group: vmadmin
        mode: '0755'

    - name: Copy Terraform files from controller to homelab
      synchronize:
        src: "{{ terraform_src_dir }}/"
        dest: "{{ terraform_dir }}/"
        mode: push
        rsync_opts:
          - "--exclude=.terraform"
          - "--exclude=.terraform.lock.hcl"
    - name: Ensure Terraform directory and files are owned by vmadmin
      file:
        path: "{{ terraform_dir }}"
        state: directory
        owner: vmadmin
        group: vmadmin
        recurse: yes

    - name: Ensure ISO directory exists
      file:
        path: "/home/vmadmin/iso"
        state: directory
        owner: vmadmin
        group: vmadmin
        mode: '0755'

    - name: Configure VMware Workstation REST API Credentials
      # This sets the credentials for the vmrest daemon
      command: "/usr/bin/vmrest -C -u {{ vmws_user }} -p {{ vmws_pass }}"
      register: vmrest_creds
      changed_when: vmrest_creds.rc == 0
      ignore_errors: true # May fail if vmrest is not installed yet (manual step required)

    - name: Enable and Start VMware REST API Service
      systemd:
        name: vmware-workstation-server
        state: started
        enabled: yes
      ignore_errors: true # Service might be named differently depending on version

    - name: Ensure vmrest is running (fallback if systemd service missing)
      shell: "nohup /usr/bin/vmrest > /var/log/vmrest.log 2>&1 &"
      async: 10
      poll: 0
      when: vmrest_creds.rc == 0

    - name: Run terraform init
      command: "{{ terraform_bin }} init -upgrade -reconfigure"
      args:
        chdir: "{{ terraform_dir }}"
      become_user: vmadmin

    - name: Run terraform apply (auto-approve)
      command: >
        {{ terraform_bin }} apply -auto-approve 
        -var='vmws_user={{ vmws_user }}'
        -var='vmws_password={{ vmws_pass }}'
        -var='iso_path=/home/vmadmin/iso/windows11.iso'
      args:
        chdir: "{{ terraform_dir }}"
      become_user: vmadmin
