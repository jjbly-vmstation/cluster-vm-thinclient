---
- name: Setup VMware Workstation Environment on RHEL Homelab
  hosts: homelab
  become: true
  vars:
    terraform_version: "1.5.0"
    terraform_bin: "/usr/local/bin/terraform"
    terraform_dir: "/home/vmadmin/vmstation-org/cluster-vm-thinclient/terraform"
    # Credentials from your manual setup
    vmws_user: "jashandeepjustinbains"
    vmrest_port: 8697
    vm_admin_user: "vmadmin"
    iso_path: "/home/vmadmin/iso/en-us_windows_11_business_editions_version_25h2_updated_feb_2026_x64_dvd_9271bf68.iso"

  tasks:

    # --- PREFLIGHT CHECKS ---
    - name: Verify VMware kernel modules are loaded
      shell: lsmod | grep -E "vmmon|vmnet"
      register: vmware_modules
      failed_when: vmware_modules.rc != 0
      changed_when: false

    - name: Check for existence of critical nested library folders
      stat:
        path: "/usr/lib/vmware/lib/libvmwarebase.so"
      register: lib_base_folder
      failed_when: not lib_base_folder.stat.isdir

    - name: Validate vmrest binary path
      stat:
        path: "/usr/bin/vmrest"
      register: vmrest_bin
      failed_when: not vmrest_bin.stat.exists

    - name: Ensure ~/.vmrestcfg exists for the API user
      stat:
        path: "/home/{{ vmws_user }}/.vmrestCfg"
      register: vmrest_config
      failed_when: not vmrest_config.stat.exists
      become_user: "{{ vmws_user }}"

    # 1. PRE-REQUISITE VALIDATION (Replaces the broken 'expect' task)
    - name: Verify manual vmrest configuration exists
      stat:
        path: "/home/{{ vmws_user }}/.vmrestcfg"
      register: vmrest_cfg_check
      failed_when: not vmrest_cfg_check.stat.exists
      msg: "FATAL: .vmrestcfg not found. Please run 'vmrest -C' manually as {{ vmws_user }} first."

    # 2. PERMISSION ENFORCEMENT
    - name: Ensure correct ownership of the config file
      file:
        path: "/home/{{ vmws_user }}/.vmrestcfg"
        owner: "{{ vmws_user }}"
        group: "{{ vmws_user }}"
        mode: '0600'
      # This ensures the file is lowercase and secure as required by VMware

    # 3. SYSTEMD SERVICE (Using the nested library fix we documented)
    - name: Create systemd unit file
      copy:
        dest: /etc/systemd/system/vmrest.service
        content: |
          [Unit]
          Description=VMware REST API Service
          After=network.target

          [Service]
          Type=simple
          User={{ vmws_user }}
          # Pointing to nested directories to avoid Error 21
          Environment="LD_LIBRARY_PATH=/usr/lib/vmware/lib/libvmwarebase.so:/usr/lib/vmware/lib/libvnetlib.so:/usr/lib/vmware/lib/libgcc_s.so.1:/usr/lib/vmware/lib"
          Environment="VMWARE_USE_SHIPPED_LIBS=1"
          ExecStart=/usr/bin/vmrest -i 0.0.0.0 -p {{ vmrest_port }}
          Restart=on-failure
          RestartSec=5

          [Install]
          WantedBy=multi-user.target
      notify: Reload Systemd

    # 4. SERVICE PERSISTENCE
    - name: Ensure vmrest is enabled and running with the new config
      systemd:
        name: vmrest
        state: restarted
        enabled: yes

    - name: Wait for vmrest to be ready on port {{ vmrest_port }}
      wait_for:
        port: "{{ vmrest_port }}"
        delay: 2
        timeout: 30

    # 5. TERRAFORM DEPLOYMENT
    - name: Run terraform init
      command: "{{ terraform_bin }} init -upgrade"
      args:
        chdir: "{{ terraform_dir }}"
      become_user: "{{ vm_admin_user }}"

    - name: Run terraform apply
      command: >
        {{ terraform_bin }} apply -auto-approve
        -var='vmws_user={{ vmws_user }}'
        -var='vmws_password={{ vmws_pass }}'
        -var='iso_path={{ iso_path }}'
      args:
        chdir: "{{ terraform_dir }}"
      become_user: "{{ vm_admin_user }}"

  handlers:
    - name: Reload Systemd
      systemd:
        daemon_reload: yes