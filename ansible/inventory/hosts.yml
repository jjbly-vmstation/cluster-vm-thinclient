---
# Inventory for Windows VM thin-client setup
# Run playbooks FROM masternode; targets homelab (RHEL 10) - 192.168.4.62
# masternode SSHs into homelab as jashandeepjustinbains (passwordless sudo)

all:
  children:
    rhel_vm_hosts:
      hosts:
        homelab:
          ansible_host: 192.168.4.62
          ansible_user: jashandeepjustinbains
          ansible_ssh_private_key_file: /home/jjbly/.ssh/id_ed25519

# Windows VM (post-install, WinRM required)
# Uncomment and configure after Windows install:
# windows_vm_hosts:
#   hosts:
#     windows-thinclient:
#       ansible_host: 192.168.4.xxx  # VM IP (from DHCP or static)
#       ansible_connection: winrm
